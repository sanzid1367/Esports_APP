<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Match Result</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <h1>Add Match Result</h1>
        <div id="auth-status" style="float: right; margin-right: 20px; margin-top: -40px;">
            <a href="admin.html" style="color: white; text-decoration: none;">Admin Login</a>
        </div>
    </header>
    <div class="nav">
        <a href="index.html">Dashboard</a>
        <a href="matches.html">Back to Matches</a>
    </div>
    <div class="container">
        <h2>Enter Match Result</h2>
        
        <div id="match-summary-card" class="card" style="margin-bottom: 20px; background-color: #f9f9f9;">
            <p>Loading match info...</p>
        </div>

        <div class="card" id="admin-form-container" style="display: none;">
            <form id="add-result-form">
                <div class="form-group">
                    <label for="winner_id">Winner:</label>
                    <select id="winner_id" required>
                        <!-- populated via JS with Team 1, Team 2, or Draw/None -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="team1_score" id="team1_score_label">Team 1 Score:</label>
                    <input type="number" id="team1_score" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="team2_score" id="team2_score_label">Team 2 Score:</label>
                    <input type="number" id="team2_score" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="duration">Match Duration (HH:MM:SS):</label>
                    <input type="text" id="duration" placeholder="e.g. 00:45:30" pattern="[0-9]{2}:[0-9]{2}:[0-9]{2}" required>
                </div>
                
                <button type="submit">Save Result</button>
            </form>
            <div id="form-msg" style="margin-top: 10px;"></div>
        </div>

        <div id="login-alert" class="card" style="margin-bottom: 20px; border-left: 5px solid #e74c3c;">
            <p>Only logged-in administrators can add or edit match results. <a href="admin.html">Login as Admin</a>.</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 E-Sports Tournament Manager. All rights reserved.</p>
    </footer>

    <script src="./js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadMatchInfoForResultForm();
            
            const form = document.getElementById('add-result-form');
            if (form) {
                form.addEventListener('submit', handleAddResult);
            }
        });
    </script>
</body>
</html>
