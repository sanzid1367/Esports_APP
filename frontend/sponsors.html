<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sports Tournament Manager - Sponsors</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <h1>E-Sports Tournament Manager</h1>
        <div id="auth-status" style="float: right; margin-right: 20px; margin-top: -40px;">
            <a href="admin.html" style="color: white; text-decoration: none;">Admin Login</a>
        </div>
    </header>
    <div class="nav">
        <a href="index.html">Dashboard</a>
        <a href="tournaments.html">Tournaments</a>
        <a href="teams.html">Teams</a>
        <a href="players.html">Players</a>
        <a href="matches.html">Matches</a>
        <a href="sponsors.html">Sponsors</a>
    </div>
    <div class="container">
        <h2>Sponsors</h2>

        <!-- Add Sponsor Form (Visible only to Admin) -->
        <div class="card" id="admin-form-container" style="display: none; margin-bottom: 20px;">
            <h3>Add New Sponsor</h3>
            <form id="add-sponsor-form">
                <div class="form-group">
                    <label for="name">Sponsor Name:</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Contact Email:</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="amount">Sponsorship Amount ($):</label>
                    <input type="number" id="amount" step="0.01" required>
                </div>
                
                <button type="submit">Add Sponsor</button>
            </form>
            <div id="form-msg" style="margin-top: 10px;"></div>
        </div>

        <div id="login-alert" class="card" style="margin-bottom: 20px; border-left: 5px solid #3498db;">
            <p>You are viewing as guest. <a href="admin.html">Login as Admin</a> to add sponsors.</p>
        </div>

        <h3>All Sponsors</h3>
        <div id="sponsors-list">
            <p>Loading sponsors...</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 E-Sports Tournament Manager. All rights reserved.</p>
    </footer>

    <script src="./js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadSponsorsList();
            
            const form = document.getElementById('add-sponsor-form');
            if (form) {
                form.addEventListener('submit', handleAddSponsor);
            }
        });
    </script>
</body>
</html>
