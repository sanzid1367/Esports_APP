<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sports Tournament Manager - Tournaments</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <h1>E-Sports Tournament Manager</h1>
        <div id="auth-status" style="float: right; margin-right: 20px; margin-top: -40px;">
            <a href="admin.html" style="color: white; text-decoration: none;">Admin Login</a>
        </div>
    </header>
    <div class="nav">
        <a href="index.html">Dashboard</a>
        <a href="tournaments.html">Tournaments</a>
        <a href="teams.html">Teams</a>
        <a href="players.html">Players</a>
        <a href="matches.html">Matches</a>
        <a href="sponsors.html">Sponsors</a>
    </div>
    <div class="container">
        <h2>Tournaments</h2>

        <!-- Add Tournament Form (Visible only to Admin) -->
        <div class="card" id="admin-form-container" style="display: none; margin-bottom: 20px;">
            <h3>Add New Tournament</h3>
            <form id="add-tournament-form">
                <div class="form-group">
                    <label for="name">Tournament Name:</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label for="game_id">Game:</label>
                    <select id="game_id" required>
                        <!-- populated via JS -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="start_date">Start Date:</label>
                    <input type="date" id="start_date" required>
                </div>
                
                <div class="form-group">
                    <label for="end_date">End Date:</label>
                    <input type="date" id="end_date" required>
                </div>
                
                <div class="form-group">
                    <label for="prize_pool">Prize Pool ($):</label>
                    <input type="number" id="prize_pool" step="0.01" required>
                </div>
                
                <div class="form-group">
                    <label for="location">Location:</label>
                    <input type="text" id="location" required>
                </div>
                
                <div class="form-group">
                    <label for="status">Status:</label>
                    <select id="status" required>
                        <option value="upcoming">Upcoming</option>
                        <option value="ongoing">Ongoing</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                
                <button type="submit">Add Tournament</button>
            </form>
            <div id="form-msg" style="margin-top: 10px;"></div>
        </div>

        <div id="login-alert" class="card" style="margin-bottom: 20px; border-left: 5px solid #3498db;">
            <p>You are viewing as guest. <a href="admin.html">Login as Admin</a> to add tournaments.</p>
        </div>

        <h3>All Tournaments</h3>
        <div id="tournaments-list">
            <p>Loading tournaments...</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 E-Sports Tournament Manager. All rights reserved.</p>
    </footer>

    <script src="./js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadGamesDropdown();
            loadTournamentsList();
            
            const form = document.getElementById('add-tournament-form');
            if (form) {
                form.addEventListener('submit', handleAddTournament);
            }
        });
    </script>
</body>
</html>
