<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sports Tournament Manager - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#09090b',
                        foreground: '#fafafa',
                        card: '#18181b',
                        'card-foreground': '#fafafa',
                        popover: '#09090b',
                        'popover-foreground': '#fafafa',
                        primary: '#7c3aed',
                        'primary-foreground': '#fafafa',
                        secondary: '#27272a',
                        'secondary-foreground': '#fafafa',
                        muted: '#27272a',
                        'muted-foreground': '#a1a1aa',
                        accent: '#27272a',
                        'accent-foreground': '#fafafa',
                        destructive: '#ef4444',
                        border: '#27272a',
                        input: '#27272a',
                        ring: '#a78bfa'
                    },
                    borderRadius: {
                        lg: '0.75rem',
                        md: '0.5rem',
                        sm: '0.375rem'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./css/style.css">
    <!-- Lucide SVG Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-zinc-50 min-h-screen flex flex-col justify-between">
    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-md bg-zinc-950/80 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="size-9 rounded-lg bg-violet-600/10 border border-violet-500/30 flex items-center justify-center font-bold text-violet-400 shadow-sm">
                <i data-lucide="trophy" class="size-5"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-zinc-150">E-Sports Tournament Manager</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="glass-card rounded-2xl p-8 shadow-xl relative overflow-hidden">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold text-zinc-50 tracking-tight">E-Sports Portal Login</h2>
                    <p class="text-xs text-zinc-400 mt-1">Authenticate to access the tournament manager.</p>
                </div>

                <form id="login-form" class="space-y-4">
                    <div class="space-y-1">
                        <label for="username" class="text-xs font-semibold text-zinc-400">Username</label>
                        <input type="text" id="username" placeholder="Enter username" required
                            class="w-full bg-zinc-900 border border-zinc-800 text-zinc-100 rounded-lg px-3.5 py-2 text-sm placeholder-zinc-650 focus:outline-none focus:ring-2 focus:ring-violet-600 focus:border-transparent transition-all">
                    </div>
                    
                    <div class="space-y-1">
                        <div class="flex justify-between items-center">
                            <label for="password" class="text-xs font-semibold text-zinc-400">Password</label>
                        </div>
                        <input type="password" id="password" placeholder="••••••••" required
                            class="w-full bg-zinc-900 border border-zinc-800 text-zinc-100 rounded-lg px-3.5 py-2 text-sm placeholder-zinc-650 focus:outline-none focus:ring-2 focus:ring-violet-600 focus:border-transparent transition-all">
                    </div>

                    <button type="submit" 
                        class="w-full bg-violet-600 hover:bg-violet-500 text-zinc-50 font-semibold py-2.5 rounded-lg text-sm transition-all shadow-md shadow-violet-600/10 flex items-center justify-center gap-1.5">
                        <i data-lucide="key-round" class="size-4"></i> Login
                    </button>
                </form>

                <p id="error-msg" class="text-xs text-rose-500 text-center font-medium mt-3 min-h-[16px]"></p>

                <!-- Credentials Info Badge -->
                <div class="mt-6 border-t border-zinc-800/80 pt-4 text-xs text-zinc-400 bg-zinc-900/20 rounded-lg p-3 border border-zinc-800/40 space-y-3">
                    <p class="font-bold text-zinc-300 text-center">Demo Credentials</p>
                    <div class="grid grid-cols-2 gap-4 text-[11px]">
                        <div class="space-y-1 text-center border-r border-zinc-800/80 pr-2">
                            <span class="text-[10px] font-semibold text-violet-400 block mb-1">ADMIN ROLE</span>
                            <div>User: <code class="bg-zinc-850 px-1 py-0.5 rounded text-zinc-200">admin</code></div>
                            <div>Pass: <code class="bg-zinc-850 px-1 py-0.5 rounded text-zinc-200">admin123</code></div>
                        </div>
                        <div class="space-y-1 text-center pl-2">
                            <span class="text-[10px] font-semibold text-blue-400 block mb-1">USER ROLE</span>
                            <div>User: <code class="bg-zinc-850 px-1 py-0.5 rounded text-zinc-200">user</code></div>
                            <div>Pass: <code class="bg-zinc-850 px-1 py-0.5 rounded text-zinc-200">user123</code></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Back navigation -->
            <div class="text-center mt-6">
                <a href="index.html" class="text-xs text-zinc-500 hover:text-zinc-300 transition-colors inline-flex items-center gap-1 font-semibold">
                    ← Back to Dashboard
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-zinc-900 bg-zinc-950/40 py-6 text-center text-xs text-zinc-500">
        <p>&copy; 2026 E-Sports Tournament Manager. All rights reserved.</p>
    </footer>

    <script src="./js/app.js"></script>
    <script>
        // Run auth redirect check
        checkAuth();
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);
            
            errorMsg.innerText = '';
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('admin_token', data.access_token);
                    localStorage.setItem('user_role', data.role);
                    errorMsg.className = 'text-xs text-emerald-400 text-center font-medium mt-3';
                    errorMsg.innerText = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    errorMsg.innerText = 'Invalid username or password';
                }
            } catch (err) {
                errorMsg.innerText = 'Failed to connect to server';
            }
        });
        
        // Initial render of icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</body>
</html>
