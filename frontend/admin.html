<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sports Tournament Manager - Admin Login</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .login-container input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        .login-container button {
            width: 100%;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
        }
        .login-container button:hover {
            background-color: #555;
        }
        #error-msg {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Admin Login</h1>
    </header>
    <div class="nav">
        <a href="index.html">Back to Dashboard</a>
    </div>
    <div class="container">
        <div class="login-container">
            <h2>Login</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p id="error-msg"></p>
            <div style="margin-top: 15px; font-size: 13px; color: #666; text-align: center; border-top: 1px solid #eee; padding-top: 10px;">
                <strong>Demo Credentials:</strong><br>
                Username: <code style="background: #eee; padding: 2px 4px; border-radius: 3px;">admin</code><br>
                Password: <code style="background: #eee; padding: 2px 4px; border-radius: 3px;">admin123</code>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('admin_token', data.access_token);
                    alert('Login successful!');
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('error-msg').innerText = 'Invalid credentials';
                }
            } catch (err) {
                document.getElementById('error-msg').innerText = 'Failed to connect to server';
            }
        });
    </script>
</body>
</html>
