<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sports Tournament Manager - Players</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#09090b',
                        foreground: '#fafafa',
                        card: '#18181b',
                        'card-foreground': '#fafafa',
                        popover: '#09090b',
                        'popover-foreground': '#fafafa',
                        primary: '#7c3aed',
                        'primary-foreground': '#fafafa',
                        secondary: '#27272a',
                        'secondary-foreground': '#fafafa',
                        muted: '#27272a',
                        'muted-foreground': '#a1a1aa',
                        accent: '#27272a',
                        'accent-foreground': '#fafafa',
                        destructive: '#ef4444',
                        border: '#27272a',
                        input: '#27272a',
                        ring: '#a78bfa'
                    },
                    borderRadius: {
                        lg: '0.75rem',
                        md: '0.5rem',
                        sm: '0.375rem'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./css/style.css">
    <!-- Lucide SVG Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-zinc-50 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-md bg-zinc-950/80 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="size-9 rounded-lg bg-violet-600/10 border border-violet-500/30 flex items-center justify-center font-bold text-violet-400 shadow-sm">
                <i data-lucide="trophy" class="size-5"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-zinc-150">E-Sports Tournament Manager</h1>
        </div>
        <div id="auth-status" class="flex items-center gap-4"></div>
    </header>

    <!-- Navigation -->
    <nav class="border-b border-zinc-800/50 bg-zinc-900/10 px-6 py-3">
        <div class="max-w-6xl mx-auto flex flex-wrap gap-2 md:gap-4">
            <a href="index.html" class="text-zinc-400 hover:text-zinc-50 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-1.5">
                <i data-lucide="layout-dashboard" class="size-4"></i> Dashboard
            </a>
            <a href="tournaments.html" class="text-zinc-400 hover:text-zinc-50 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-1.5">
                <i data-lucide="award" class="size-4"></i> Tournaments
            </a>
            <a href="teams.html" class="text-zinc-400 hover:text-zinc-50 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-1.5">
                <i data-lucide="shield" class="size-4"></i> Teams
            </a>
            <a href="players.html" class="bg-zinc-800 text-zinc-50 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-1.5">
                <i data-lucide="users" class="size-4"></i> Players
            </a>
            <a href="matches.html" class="text-zinc-400 hover:text-zinc-50 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-1.5">
                <i data-lucide="swords" class="size-4"></i> Matches
            </a>
            <a href="sponsors.html" class="text-zinc-400 hover:text-zinc-50 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-1.5">
                <i data-lucide="handshake" class="size-4"></i> Sponsors
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 md:px-6 py-8">
        <div class="mb-8">
            <h2 class="text-3xl font-bold tracking-tight text-zinc-50">Players</h2>
            <p class="text-sm text-zinc-400 mt-1">Register new players and overview active team rosters.</p>
        </div>



        <!-- List Section -->
        <div class="space-y-4">
            <h3 class="text-xl font-bold text-zinc-50 flex items-center gap-2">
                <i data-lucide="users" class="size-5 text-violet-500"></i>
                Pro Roster Database
            </h3>
            <div id="players-list">
                <div class="glass-card rounded-xl p-8 text-center text-zinc-500 italic">Loading rosters...</div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-zinc-900 bg-zinc-950/40 py-6 mt-12 text-center text-xs text-zinc-500">
        <p>&copy; 2026 E-Sports Tournament Manager. All rights reserved.</p>
    </footer>

    <script src="./js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadTeamsDropdown();
            loadPlayersList();
            
            const form = document.getElementById('add-player-form');
            if (form) {
                form.addEventListener('submit', handleAddPlayer);
            }
        });
    </script>
</body>
</html>
