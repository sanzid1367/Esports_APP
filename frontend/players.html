<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sports Tournament Manager - Players</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <h1>E-Sports Tournament Manager</h1>
        <div id="auth-status" style="float: right; margin-right: 20px; margin-top: -40px;">
            <a href="admin.html" style="color: white; text-decoration: none;">Admin Login</a>
        </div>
    </header>
    <div class="nav">
        <a href="index.html">Dashboard</a>
        <a href="tournaments.html">Tournaments</a>
        <a href="teams.html">Teams</a>
        <a href="players.html">Players</a>
        <a href="matches.html">Matches</a>
        <a href="sponsors.html">Sponsors</a>
    </div>
    <div class="container">
        <h2>Players</h2>

        <!-- Add Player Form (Visible only to Admin) -->
        <div class="card" id="admin-form-container" style="display: none; margin-bottom: 20px;">
            <h3>Add New Player</h3>
            <form id="add-player-form">
                <div class="form-group">
                    <label for="team_id">Team:</label>
                    <select id="team_id" required>
                        <!-- populated via JS -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="player_name">Player Name:</label>
                    <input type="text" id="player_name" required>
                </div>
                
                <div class="form-group">
                    <label for="in_game_name">In-Game Name:</label>
                    <input type="text" id="in_game_name" required>
                </div>
                
                <div class="form-group">
                    <label for="role">Role:</label>
                    <input type="text" id="role">
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="dob">Date of Birth:</label>
                    <input type="date" id="dob">
                </div>
                
                <button type="submit">Add Player</button>
            </form>
            <div id="form-msg" style="margin-top: 10px;"></div>
        </div>

        <div id="login-alert" class="card" style="margin-bottom: 20px; border-left: 5px solid #3498db;">
            <p>You are viewing as guest. <a href="admin.html">Login as Admin</a> to add players.</p>
        </div>

        <h3>All Players</h3>
        <div id="players-list">
            <p>Loading players...</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 E-Sports Tournament Manager. All rights reserved.</p>
    </footer>

    <script src="./js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadTeamsDropdown();
            loadPlayersList();
            
            const form = document.getElementById('add-player-form');
            if (form) {
                form.addEventListener('submit', handleAddPlayer);
            }
        });
    </script>
</body>
</html>
