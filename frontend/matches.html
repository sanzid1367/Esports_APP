<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sports Tournament Manager - Matches</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <h1>E-Sports Tournament Manager</h1>
        <div id="auth-status" style="float: right; margin-right: 20px; margin-top: -40px;">
            <a href="admin.html" style="color: white; text-decoration: none;">Admin Login</a>
        </div>
    </header>
    <div class="nav">
        <a href="index.html">Dashboard</a>
        <a href="tournaments.html">Tournaments</a>
        <a href="teams.html">Teams</a>
        <a href="players.html">Players</a>
        <a href="matches.html">Matches</a>
        <a href="sponsors.html">Sponsors</a>
    </div>
    <div class="container">
        <h2>Matches</h2>

        <!-- Add Match Form (Visible only to Admin) -->
        <div class="card" id="admin-form-container" style="display: none; margin-bottom: 20px;">
            <h3>Schedule New Match</h3>
            <form id="add-match-form">
                <div class="form-group">
                    <label for="tournament_id">Tournament:</label>
                    <select id="tournament_id" required>
                        <!-- populated via JS -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="team1_id">Team 1:</label>
                    <select id="team1_id" required>
                        <!-- populated via JS -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="team2_id">Team 2:</label>
                    <select id="team2_id" required>
                        <!-- populated via JS -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="match_date">Match Date & Time:</label>
                    <input type="datetime-local" id="match_date" required>
                </div>
                
                <div class="form-group">
                    <label for="stage">Stage:</label>
                    <input type="text" id="stage" placeholder="e.g. Group Stage, Semifinals" required>
                </div>
                
                <button type="submit">Schedule Match</button>
            </form>
            <div id="form-msg" style="margin-top: 10px;"></div>
        </div>

        <div id="login-alert" class="card" style="margin-bottom: 20px; border-left: 5px solid #3498db;">
            <p>You are viewing as guest. <a href="admin.html">Login as Admin</a> to schedule matches and add results.</p>
        </div>

        <h3>All Matches</h3>
        <div id="matches-list">
            <p>Loading matches...</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 E-Sports Tournament Manager. All rights reserved.</p>
    </footer>

    <script src="./js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadTournamentsDropdown();
            loadTeamsDropdowns();
            loadMatchesList();
            
            const form = document.getElementById('add-match-form');
            if (form) {
                form.addEventListener('submit', handleAddMatch);
            }
        });
    </script>
</body>
</html>
